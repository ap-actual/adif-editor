<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADIF Log Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #21262d;
    --accent:   #39d353;
    --accent2:  #58a6ff;
    --warn:     #f78166;
    --muted:    #8b949e;
    --text:     #e6edf3;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
    flex: 1;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
  }

  /* ── Toolbar ── */
  #toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

  button {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    line-height: 1;
  }
  button:active { transform: scale(.97); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-green {
    background: var(--accent);
    color: #0d1117;
  }
  .btn-green:hover { opacity: .85; }

  .btn-blue {
    background: var(--accent2);
    color: #0d1117;
  }
  .btn-blue:hover { opacity: .85; }

  .btn-red {
    background: var(--warn);
    color: #0d1117;
  }
  .btn-red:hover { opacity: .85; }

  #stats {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Drop zone ── */
  #dropzone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 20px;
    border: 2px dashed var(--border);
    margin: 32px;
    border-radius: 12px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(57,211,83,.05);
  }
  #dropzone svg { opacity: .4; }
  #dropzone p { color: var(--muted); font-size: 15px; }
  #dropzone strong { color: var(--accent2); }
  #fileInput { display: none; }

  /* ── Main layout ── */
  #app { display: none; flex: 1; flex-direction: column; overflow: hidden; }

  /* ── Table ── */
  #tableWrap {
    flex: 1;
    overflow: auto;
    padding: 0 0 12px;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    white-space: nowrap;
    user-select: none;
    cursor: pointer;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: pointer;
  }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody tr.selected { background: rgba(88,166,255,.08) !important; outline: 1px solid rgba(88,166,255,.3); }

  td {
    padding: 8px 12px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: var(--mono);
  }
  td.col-num {
    color: var(--muted);
    font-size: 11px;
    width: 40px;
    text-align: right;
  }
  td.col-call { color: var(--accent); font-weight: bold; }
  td.col-date { color: var(--accent2); }
  td.col-time { color: var(--muted); }
  td.col-band { color: #e3b341; }
  td.col-mode { color: #f0883e; }

  td.actions { width: 80px; }
  td.actions button { padding: 3px 8px; font-size: 11px; margin-right: 4px; }

  /* ── Modal ── */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #modalHeader {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #modalHeader h2 {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--accent);
    flex: 1;
  }
  #modalBody {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }

  /* field grid */
  .field-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-group label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .field-group input, .field-group select, .field-group textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }
  .field-group input:focus, .field-group select:focus, .field-group textarea:focus {
    border-color: var(--accent2);
  }
  .field-group textarea { resize: vertical; min-height: 60px; }
  .field-group select option { background: var(--surface); }

  .field-group.span2 { grid-column: span 2; }
  .field-group.span3 { grid-column: 1 / -1; }

  /* extra fields section */
  .extra-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
    margin-bottom: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .extra-header h3 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    flex: 1;
  }
  .extra-row {
    display: grid;
    grid-template-columns: 1fr 2fr auto;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .extra-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
  }
  .extra-row input:focus { border-color: var(--accent2); }
  .btn-icon {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--border);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1;
  }
  .btn-icon:hover { border-color: var(--warn); }

  #modalFooter {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ── Search bar ── */
  #searchBar {
    padding: 8px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  #searchBar input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 12px;
    outline: none;
    width: 220px;
  }
  #searchBar input:focus { border-color: var(--accent2); }
  #searchBar label { color: var(--muted); font-size: 12px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 18px;
    z-index: 200;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .25s, transform .25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⬡ ADIF LOG EDITOR</h1>
  <span class="badge">ADIF 3.1.7</span>
</header>

<div id="dropzone">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#39d353" stroke-width="1.5">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="12" y1="18" x2="12" y2="12"/>
    <line x1="9" y1="15" x2="15" y2="15"/>
  </svg>
  <p>Drop an <strong>.adi / .adif</strong> file here, or click to browse</p>
  <p style="font-size:12px; color:var(--muted)">You can also start fresh with an empty log</p>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn-blue" onclick="document.getElementById('fileInput').click()">Open File</button>
    <button class="btn-ghost" onclick="startFresh()">New Empty Log</button>
  </div>
  <input type="file" id="fileInput" accept=".adi,.adif">
</div>

<div id="app">
  <div id="toolbar">
    <button class="btn-green" onclick="addQSO()">＋ Add QSO</button>
    <button class="btn-ghost" onclick="document.getElementById('fileInput').click()">Open File</button>
    <div class="sep"></div>
    <button class="btn-blue" onclick="saveADIF()">⬇ Save ADIF</button>
    <div class="sep"></div>
    <button class="btn-ghost" onclick="deleteSelected()" id="btnDeleteSel" disabled>Delete Selected</button>
    <span id="stats"></span>
  </div>

  <div id="searchBar">
    <label>Search:</label>
    <input type="text" id="searchInput" placeholder="callsign, band, mode…" oninput="renderTable()">
    <label style="margin-left:12px">Sort:</label>
  </div>

  <div id="tableWrap">
    <table id="qsoTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div id="modalHeader">
      <h2 id="modalTitle">QSO</h2>
      <button class="btn-ghost" onclick="closeModal()" style="padding:4px 10px">✕</button>
    </div>
    <div id="modalBody"></div>
    <div id="modalFooter">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-green" onclick="saveModal()">Save QSO</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let qsos = [];           // array of {id, fields: {NAME:value, ...}}
let headerComment = '';  // text before <EOH>
let nextId = 1;
let sortCol = null;
let sortDir = 1;          // 1=asc, -1=desc
let editingId = null;
let selectedIds = new Set();
let lookupTimeout;

// ADIF columns to show in the main table (in order)
const TABLE_COLS = ['CALL','QSO_DATE','TIME_ON','BAND','FREQ','MODE','SUBMODE','RST_SENT','RST_RCVD','NAME','COMMENT'];

// Common QSO fields for the modal's main section (in display order)
const COMMON_FIELDS = [
  { name:'CALL',     label:'Callsign',     size:1 },
  { name:'QSO_DATE', label:'Date (YYYYMMDD)', size:1 },
  { name:'TIME_ON',  label:'Time On (HHMM)', size:1 },
  { name:'TIME_OFF', label:'Time Off (HHMM)', size:1 },
  { name:'BAND',     label:'Band',       size:1,
    options:['','160m','80m','60m','40m','30m','20m','17m','15m','12m','10m','6m','4m','2m','1.25m','70cm','33cm','23cm','13cm','9cm','6cm','3cm','1.25cm','6mm','4mm','2.5mm','2mm','1mm'] },
  { name:'FREQ',     label:'Freq (MHz)', size:1 },
  { name:'MODE',     label:'Mode',       size:1,
    options:['','AM','ATV','CHIP','CLO','CONTESTI','CW','DIGITALVOICE','DOMINO','DYNAMIC','FAX','FM','FSK441','FT8','HELL','ISCAT','JT4','JT6M','JT9','JT44','JT65','MFSK','MSK144','MT63','OLIVIA','OPERA','PAC','PAX','PKT','PSK','PSK2K','Q15','QRA64','ROS','RTTY','RTTYM','SSB','SSTV','T10','THOR','THRB','TOR','V4','VOI','WINMOR','WSPR'] },
  { name:'SUBMODE',  label:'Submode',    size:1 },
  { name:'RST_SENT', label:'RST Sent',   size:1 },
  { name:'RST_RCVD', label:'RST Rcvd',   size:1 },
  { name:'TX_PWR',   label:'TX Power (W)', size:1 },
  { name:'NAME',     label:'Name',       size:1 },
  { name:'QTH',      label:'QTH',        size:1 },
  { name:'GRIDSQUARE', label:'Grid Square', size:1 },
  { name:'STATE',    label:'State',      size:1 },
  { name:'COUNTRY',  label:'Country',    size:1 },
  { name:'DXCC',     label:'DXCC',       size:1 },
  { name:'CONT',     label:'Continent',  size:1,
    options:['','AF','AN','AS','EU','NA','OC','SA'] },
  { name:'CQZ',      label:'CQ Zone',    size:1 },
  { name:'ITUZ',     label:'ITU Zone',   size:1 },
  { name:'IOTA',     label:'IOTA',       size:1 },
  { name:'POTA_REF', label:'POTA Ref',   size:1 },
  { name:'SOTA_REF', label:'SOTA Ref',   size:1 },
  { name:'MY_GRIDSQUARE', label:'My Grid', size:1 },
  { name:'STATION_CALLSIGN', label:'Station Call', size:1 },
  { name:'OPERATOR', label:'Operator',   size:1 },
  { name:'QSL_SENT', label:'QSL Sent',   size:1,
    options:['','Y','N','R','Q','I'] },
  { name:'QSL_RCVD', label:'QSL Rcvd',   size:1,
    options:['','Y','N','R','I','V'] },
  { name:'LOTW_QSL_SENT', label:'LoTW Sent', size:1,
    options:['','Y','N','R','Q','I'] },
  { name:'LOTW_QSL_RCVD', label:'LoTW Rcvd', size:1,
    options:['','Y','N','R','I','V'] },
  { name:'COMMENT', label:'Comment', size:3, multiline:true },
  { name:'NOTES',   label:'Notes',   size:3, multiline:true },
];
const COMMON_NAMES = new Set(COMMON_FIELDS.map(f => f.name));

// ─── ADIF Parser ──────────────────────────────────────────────────────────────
function parseADIF(text) {
  const records = [];
  let header = '';
  let hasEOH = false;
  let pos = 0;

  const eohMatch = text.match(/<EOH>/i);
  if (eohMatch) {
    hasEOH = true;
    header = text.slice(0, eohMatch.index);
    pos = eohMatch.index + eohMatch[0].length;
  }

  const body = hasEOH ? text.slice(pos) : text;

  // Pattern matches the tag, isolates length group, and skips extra type signatures safely
  const recRegex = /<([A-Za-z0-9_]+)(?::(\d+))?(?::[^>]+)?>/g;
  let currentFields = {};
  let match;

  recRegex.lastIndex = 0;
  while ((match = recRegex.exec(body)) !== null) {
    const tag = match[1].toUpperCase();
    const lenStr = match[2];

    if (tag === 'EOR') {
      records.push({ ...currentFields });
      currentFields = {};
      continue;
    }

    if (lenStr !== undefined) {
      const len = parseInt(lenStr, 10);
      const valueStart = match.index + match[0].length;
      const value = body.slice(valueStart, valueStart + len);
      currentFields[tag] = value;
      recRegex.lastIndex = valueStart + len;
    }
  }

  return { header, records };
}

// ─── ADIF Serializer ──────────────────────────────────────────────────────────
function serializeADIF(headerComment, qsoList) {
  const now = new Date();
  const ts = now.getFullYear().toString()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0')
    + ' '
    + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0')
    + String(now.getSeconds()).padStart(2,'0');

  let out = `ADIF Export by ADIF Log Editor\r\n`;
  out += `<ADIF_VER:5>3.1.7\r\n`;
  out += `<CREATED_TIMESTAMP:15>${ts}\r\n`;
  out += `<PROGRAMID:15>ADIF Log Editor\r\n`;
  out += `<EOH>\r\n\r\n`;

  for (const qso of qsoList) {
    const fields = qso.fields;
    for (const [k, v] of Object.entries(fields)) {
      if (v === null || v === undefined || v === '') continue;
      const vStr = String(v);
      out += `<${k}:${vStr.length}>${vStr} `;
    }
    out += `<EOR>\r\n`;
  }

  return out;
}

// ─── Load / Init ──────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadADIF(ev.target.result, file.name);
  reader.readAsText(file);
  e.target.value = '';
});

const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadADIF(ev.target.result, file.name);
  reader.readAsText(file);
});
dropzone.addEventListener('click', () => document.getElementById('fileInput').click());

function loadADIF(text, filename) {
  const parsed = parseADIF(text);
  headerComment = parsed.header;
  qsos = parsed.records.map(f => ({ id: nextId++, fields: f }));
  selectedIds.clear();
  sortCol = null;
  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildTableHeader();
  renderTable();
  toast(`Loaded ${qsos.length} QSOs from ${filename}`);
}

function startFresh() {
  qsos = [];
  headerComment = '';
  selectedIds.clear();
  sortCol = null;
  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildTableHeader();
  renderTable();
}

// ─── Table Rendering ──────────────────────────────────────────────────────────
function buildTableHeader() {
  const thead = document.getElementById('thead');
  const cols = ['#', ...TABLE_COLS, ''];
  thead.innerHTML = '<tr>' + cols.map((c, i) => {
    if (c === '#' || c === '') return `<th>${c}</th>`;
    return `<th data-col="${c}" onclick="sortBy('${c}')">${c}</th>`;
  }).join('') + '</tr>';
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  renderTable();
}

// ─── Field Autopopulate Pipeline ─────────────────────────────────────────────
function handleCallsignInput(val) {
  clearTimeout(lookupTimeout);
  const callsign = val.trim().toUpperCase();
  if (!callsign) return;

  const callsignRegex = /^([A-Z0-9]{1,2})\d([A-Z]{1,3})$/i;
  if (callsignRegex.test(callsign)) {
    lookupTimeout = setTimeout(() => {
      fetchCallsignData(callsign);
    }, 800);
  }
}

async function fetchCallsignData(callsign) {
  const modalBody = document.getElementById('modalBody');
  if (!modalBody) return;

  const nameInput = modalBody.querySelector('[name="NAME"]');
  const qthInput = modalBody.querySelector('[name="QTH"]');
  const stateInput = modalBody.querySelector('[name="STATE"]');
  const gridInput = modalBody.querySelector('[name="GRIDSQUARE"]');
  const countryInput = modalBody.querySelector('[name="COUNTRY"]');
  const continentSelect = modalBody.querySelector('[name="CONT"]');

  try {
    const response = await fetch(`https://callook.info/${callsign}/json`);
    if (!response.ok) return;

    const data = await response.json();

    if (data.status === 'VALID') {
      // Clean up the name format "DOE, JOHN M" -> "John M Doe"
      if (nameInput && data.name) {
        const nameParts = data.name.split(',').map(p => p.trim());
        const formattedName = nameParts.length > 1 ? `${nameParts[1]} ${nameParts[0]}` : data.name;
        // Only skip if the user typed something completely custom
        if (!nameInput.value || nameInput.value.trim() === '') {
          nameInput.value = formattedName;
        }
      }

      // Populate QTH / City
      if (qthInput && data.address?.city) {
        if (!qthInput.value || qthInput.value.trim() === '') {
          qthInput.value = data.address.city;
        }
      }

      // Populate State
      if (stateInput && data.address?.state) {
        if (!stateInput.value || stateInput.value.trim() === '') {
          stateInput.value = data.address.state;
        }
      }

      // Populate Grid Square
      if (gridInput && data.location?.grid) {
        if (!gridInput.value || gridInput.value.trim() === '') {
          gridInput.value = data.location.grid;
        }
      }

      // Populate Country (Static assignment for Callook)
      if (countryInput && (!countryInput.value || countryInput.value.trim() === '')) {
        countryInput.value = 'United States';
      }

      // Populate Continent Dropdown
      if (continentSelect && (!continentSelect.value || continentSelect.value.trim() === '')) {
        continentSelect.value = 'NA';
      }

      toast(`Populated data for ${callsign}`);
    }
  } catch (err) {
    console.error('Callsign lookup failed:', err);
  }
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = qsos;
  if (q) {
    list = list.filter(qso =>
      Object.values(qso.fields).some(v => String(v).toLowerCase().includes(q))
    );
  }
  if (sortCol) {
    list = [...list].sort((a, b) => {
      const av = (a.fields[sortCol] || '').toLowerCase();
      const bv = (b.fields[sortCol] || '').toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }
  return list;
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('tbody');

  tbody.innerHTML = filtered.map((qso, idx) => {
    const sel = selectedIds.has(qso.id) ? 'selected' : '';
    const f = (k) => esc(qso.fields[k] || '');
    const cells = TABLE_COLS.map((col, ci) => {
      const cls = [
        col === 'CALL'     ? 'col-call' : '',
        col === 'QSO_DATE' ? 'col-date' : '',
        col === 'TIME_ON'  ? 'col-time' : '',
        col === 'BAND'     ? 'col-band' : '',
        col === 'MODE'     ? 'col-mode' : '',
      ].filter(Boolean).join(' ');
      return `<td class="${cls}" title="${f(col)}">${f(col)}</td>`;
    }).join('');

    return `<tr class="${sel}" data-id="${qso.id}" onclick="rowClick(event, ${qso.id})">
      <td class="col-num">${idx+1}</td>
      ${cells}
      <td class="actions">
        <button class="btn-blue" onclick="editQSO(event, ${qso.id})">Edit</button>
        <button class="btn-red"  onclick="deleteQSO(event, ${qso.id})">Del</button>
      </td>
    </tr>`;
  }).join('');

  updateStats(filtered.length);
}

function rowClick(e, id) {
  if (e.target.tagName === 'BUTTON') return;
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderTable();
  document.getElementById('btnDeleteSel').disabled = selectedIds.size === 0;
}

function updateStats(shown) {
  const total = qsos.length;
  document.getElementById('stats').textContent =
    shown === total ? `${total} QSOs` : `${shown} / ${total} QSOs`;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Add / Edit QSO ───────────────────────────────────────────────────────────
function addQSO() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add QSO';
  renderModal({});
  openModal();
}

function editQSO(e, id) {
  e.stopPropagation();
  const qso = qsos.find(q => q.id === id);
  if (!qso) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = `Edit QSO — ${qso.fields.CALL || id}`;
  renderModal(qso.fields);
  openModal();
}

function renderModal(fields) {
  const body = document.getElementById('modalBody');

  const now = new Date();
  const todayDate = now.getFullYear().toString()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0');
  const nowTime = String(now.getUTCHours()).padStart(2,'0')
    + String(now.getUTCMinutes()).padStart(2,'0');

  let html = '<div class="field-grid">';
  for (const f of COMMON_FIELDS) {
    let val = fields[f.name] !== undefined ? fields[f.name] : '';
    if (!val && f.name === 'QSO_DATE') val = todayDate;
    if (!val && f.name === 'TIME_ON')  val = nowTime;

    const spanClass = f.size === 3 ? 'span3' : f.size === 2 ? 'span2' : '';
    html += `<div class="field-group ${spanClass}"><label>${f.label}</label>`;

    if (f.options) {
      html += `<select name="${f.name}">`;
      for (const o of f.options) {
        html += `<option value="${esc(o)}" ${val === o ? 'selected':''}>${o || '—'}</option>`;
      }
      html += '</select>';
    } else if (f.multiline) {
      html += `<textarea name="${f.name}">${esc(val)}</textarea>`;
    } else {
      const idAttr = f.name === 'CALL' ? 'id="modalCallsign"' : '';
      html += `<input type="text" ${idAttr} name="${f.name}" value="${esc(val)}">`;
    }
    html += '</div>';
  }
  html += '</div>';

  const extraFields = Object.entries(fields).filter(([k]) => !COMMON_NAMES.has(k));
  html += `<div class="extra-header">
    <h3>ADDITIONAL FIELDS</h3>
    <button class="btn-ghost" style="font-size:12px;padding:4px 10px" onclick="addExtraRow()">＋ Add Field</button>
  </div>
  <div id="extraRows">`;
  for (const [k, v] of extraFields) {
    html += extraRowHTML(k, v);
  }
  html += '</div>';

  body.innerHTML = html;

  // Track key input straight out of the structural elements initialization
  const callsignInput = document.getElementById('modalCallsign');
  if (callsignInput) {
    callsignInput.addEventListener('input', (e) => {
      handleCallsignInput(e.target.value);
    });
  }
}

function extraRowHTML(k='', v='') {
  return `<div class="extra-row">
    <input type="text" placeholder="FIELD_NAME" value="${esc(k)}" class="extra-key">
    <input type="text" placeholder="value" value="${esc(v)}" class="extra-val">
    <button class="btn-icon" onclick="this.closest('.extra-row').remove()">✕</button>
  </div>`;
}

function addExtraRow() {
  document.getElementById('extraRows').insertAdjacentHTML('beforeend', extraRowHTML());
}

function saveModal() {
  const body = document.getElementById('modalBody');
  const newFields = {};

  body.querySelectorAll('[name]').forEach(el => {
    const val = el.value.trim();
    if (val) newFields[el.name] = val;
  });

  body.querySelectorAll('#extraRows .extra-row').forEach(row => {
    const k = row.querySelector('.extra-key').value.trim().toUpperCase();
    const v = row.querySelector('.extra-val').value.trim();
    if (k && v) newFields[k] = v;
  });

  if (!newFields.CALL) { alert('CALL is required.'); return; }

  if (editingId !== null) {
    const idx = qsos.findIndex(q => q.id === editingId);
    if (idx !== -1) qsos[idx].fields = newFields;
    toast(`QSO updated — ${newFields.CALL}`);
  } else {
    qsos.push({ id: nextId++, fields: newFields });
    toast(`QSO added — ${newFields.CALL}`);
  }

  closeModal();
  renderTable();
}

// ─── Delete ───────────────────────────────────────────────────────────────────
function deleteQSO(e, id) {
  e.stopPropagation();
  const qso = qsos.find(q => q.id === id);
  if (!confirm(`Delete QSO with ${qso?.fields?.CALL || id}?`)) return;
  qsos = qsos.filter(q => q.id !== id);
  selectedIds.delete(id);
  renderTable();
  toast('QSO deleted');
}

function deleteSelected() {
  if (!selectedIds.size) return;
  if (!confirm(`Delete ${selectedIds.size} selected QSO(s)?`)) return;
  qsos = qsos.filter(q => !selectedIds.has(q.id));
  selectedIds.clear();
  document.getElementById('btnDeleteSel').disabled = true;
  renderTable();
  toast(`${qsos.length} QSOs remain`);
}

// ─── Save ADIF ────────────────────────────────────────────────────────────────
function saveADIF() {
  if (!qsos.length) { toast('No QSOs to save!'); return; }
  const content = serializeADIF(headerComment, qsos);
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `log_export_${new Date().toISOString().slice(0,10)}.adi`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Saved ${qsos.length} QSOs`);
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function openModal()   { document.getElementById('overlay').classList.add('open'); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
